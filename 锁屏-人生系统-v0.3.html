<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaperLifeOS v0.3 锁屏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      background: #020617;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      color: white;
    }

    .lockscreen {
      width: 100%;
      max-width: 400px;
      aspect-ratio: 9 / 19.5;
      background: linear-gradient(180deg, #0f172a 0%, #020617 100%);
      border-radius: 2.5rem;
      border: 1px solid #1e293b;
      padding: 2.5rem 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .lockscreen::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 28px;
      background: #020617;
      border-bottom-left-radius: 1rem;
      border-bottom-right-radius: 1rem;
      z-index: 10;
    }

    .header {
      text-align: center;
      margin-bottom: 1.25rem;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .header p {
      font-size: 0.75rem;
      color: #64748b;
    }

    .card {
      border-radius: 1rem;
      padding: 1rem;
      margin-bottom: 0.75rem;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.375rem;
    }

    .card-body {
      font-size: 0.8125rem;
      line-height: 1.5;
      opacity: 0.9;
    }

    .practice {
      background: rgba(30, 41, 59, 0.5);
      border: 1.5px solid #94a3b8;
    }

    .narrative {
      background: rgba(8, 51, 68, 0.4);
      border: 1.5px solid #22d3ee;
    }

    .anchor {
      background: rgba(136, 19, 55, 0.3);
      border: 1.5px solid #fb7185;
    }

    .adjuster {
      background: rgba(6, 78, 59, 0.4);
      border: 1.5px solid #34d399;
    }

    .adjuster .card-title {
      color: #34d399;
    }

    .row {
      display: flex;
      gap: 0.75rem;
    }

    .row .card {
      flex: 1;
    }

    .tension {
      text-align: center;
      padding: 0.5rem 0;
      margin: 0.25rem 0 0.75rem;
      border-top: 2px dashed #fbbf24;
      border-bottom: 2px dashed #fbbf24;
    }

    .tension span {
      font-size: 0.8125rem;
      color: #fbbf24;
      font-weight: 600;
    }

    .outputs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .output {
      flex: 1;
      text-align: center;
      padding: 0.625rem 0.25rem;
      border-radius: 0.625rem;
      font-size: 0.8125rem;
      font-weight: 500;
    }

    .out-action {
      background: rgba(34, 211, 238, 0.12);
      border: 1px solid #22d3ee;
      color: #22d3ee;
    }

    .out-inaction {
      background: rgba(251, 146, 60, 0.12);
      border: 1px solid #fb923c;
      color: #fb923c;
    }

    .out-debug {
      background: rgba(167, 139, 250, 0.12);
      border: 1px solid #a78bfa;
      color: #a78bfa;
    }

    .reminders {
      margin-top: auto;
    }

    .reminder {
      display: flex;
      align-items: flex-start;
      gap: 0.625rem;
      margin-bottom: 0.625rem;
      font-size: 0.8125rem;
      line-height: 1.5;
      color: #cbd5e1;
    }

    .reminder-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 0.4rem;
      flex-shrink: 0;
    }

    .footer {
      text-align: center;
      margin-top: 0.5rem;
      font-size: 0.625rem;
      color: #475569;
    }

    .arrow {
      text-align: center;
      font-size: 1rem;
      color: #475569;
      margin: 0.125rem 0;
    }

    .arrow-gold {
      color: #fbbf24;
    }

    .arrow-emerald {
      color: #34d399;
    }
  </style>
</head>
<body>
  <div class="lockscreen">
    <div class="header">
      <h1>PaperLifeOS</h1>
      <p>事件驱动 · 可调试的人生系统</p>
    </div>

    <!-- 实践层 -->
    <div class="card practice">
      <div class="card-title">实践层</div>
      <div class="card-body">我做了一件什么事？产出了什么可观测结果？</div>
    </div>

    <div class="arrow">↓</div>

    <!-- 叙事 + 锚定 -->
    <div class="row">
      <div class="card narrative">
        <div class="card-title">叙事层</div>
        <div class="card-body">我怎么解释这件事？它激活了我的哪个目标/身份？</div>
      </div>
      <div class="card anchor">
        <div class="card-title">锚定层</div>
        <div class="card-body">我的身体信号是什么？他人如何反应？结果如何？</div>
      </div>
    </div>

    <div class="arrow arrow-gold">↓</div>

    <!-- 张力带 -->
    <div class="tension">
      <span>张力带 — 直觉异常涌现</span>
    </div>

    <div class="arrow arrow-emerald">↓</div>

    <!-- 调整器 -->
    <div class="card adjuster">
      <div class="card-title">调整器</div>
      <div class="card-body">只调一层 · 当下可启动 · 最小记录 · 不追踪</div>
    </div>

    <div class="arrow">↓</div>

    <!-- 输出 -->
    <div class="outputs">
      <div class="output out-action">具体行动</div>
      <div class="output out-inaction">非行动</div>
      <div class="output out-debug">调试模式</div>
    </div>

    <!-- 提醒 -->
    <div class="reminders">
      <div class="reminder">
        <div class="reminder-dot" style="background: #22d3ee;"></div>
        <span><strong>顺境锚定：</strong>好消息时，生成一个可被证伪的负面预测</span>
      </div>
      <div class="reminder">
        <div class="reminder-dot" style="background: #fb7185;"></div>
        <span><strong>逆境锚定：</strong>坏消息时，寻找一个未被摧毁的锚定点</span>
      </div>
      <div class="reminder">
        <div class="reminder-dot" style="background: #fbbf24;"></div>
        <span><strong>身体信号：</strong>紧 · 松 · 麻木 · 过载 · 沉 · 钝 · 波动</span>
      </div>
      <div class="reminder">
        <div class="reminder-dot" style="background: #a78bfa;"></div>
        <span><strong>禁止：</strong>待办清单 · 打卡表 · 量化指标 · 同时调多层</span>
      </div>
    </div>

    <div class="footer">运行 · 观察 · 调整</div>
  </div>
</body>
</html>
