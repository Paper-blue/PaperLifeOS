<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaperLifeOS v0.3 锁屏</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #020617;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      color: white;
    }

    .lockscreen {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 9 / 19.5;
      background: linear-gradient(180deg, #0f172a 0%, #020617 100%);
      border-radius: 2.5rem;
      border: 1px solid #1e293b;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .lockscreen::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 28px;
      background: #020617;
      border-bottom-left-radius: 1rem;
      border-bottom-right-radius: 1rem;
      z-index: 10;
    }

    .header {
      text-align: center;
      margin-top: 1.5rem;
      margin-bottom: 1rem;
    }

    .header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    .header p {
      font-size: 0.625rem;
      color: #64748b;
    }

    .diagram {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .layer {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      text-align: center;
      margin-bottom: 0.75rem;
      position: relative;
    }

    .layer-title {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.125rem;
    }

    .layer-sub {
      font-size: 0.625rem;
      opacity: 0.8;
    }

    .practice {
      background: rgba(30, 41, 59, 0.6);
      border: 1.5px solid #94a3b8;
    }

    .narrative {
      background: rgba(8, 51, 68, 0.5);
      border: 1.5px solid #22d3ee;
    }

    .anchor {
      background: rgba(136, 19, 55, 0.35);
      border: 1.5px solid #fb7185;
    }

    .middle-row {
      display: flex;
      gap: 0.75rem;
      width: 100%;
      margin-bottom: 0.75rem;
    }

    .middle-row .layer {
      flex: 1;
      margin-bottom: 0;
    }

    .tension-band {
      width: 100%;
      text-align: center;
      padding: 0.375rem 0;
      margin-bottom: 0.75rem;
      border-top: 1.5px dashed #fbbf24;
      border-bottom: 1.5px dashed #fbbf24;
    }

    .tension-band span {
      font-size: 0.625rem;
      color: #fbbf24;
      font-weight: 600;
    }

    .adjuster {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(6, 78, 59, 0.5);
      border: 1.5px solid #34d399;
      border-radius: 0.75rem;
      text-align: center;
      margin-bottom: 0.75rem;
    }

    .adjuster .layer-title {
      color: #34d399;
    }

    .outputs {
      display: flex;
      gap: 0.5rem;
      width: 100%;
    }

    .output-item {
      flex: 1;
      padding: 0.5rem 0.25rem;
      border-radius: 0.5rem;
      text-align: center;
      font-size: 0.625rem;
      font-weight: 500;
    }

    .output-action {
      background: rgba(34, 211, 238, 0.15);
      border: 1px solid #22d3ee;
      color: #22d3ee;
    }

    .output-inaction {
      background: rgba(251, 146, 60, 0.15);
      border: 1px solid #fb923c;
      color: #fb923c;
    }

    .output-debug {
      background: rgba(167, 139, 250, 0.15);
      border: 1px solid #a78bfa;
      color: #a78bfa;
    }

    .connector {
      width: 1.5px;
      height: 0.5rem;
      background: #475569;
      margin: 0 auto;
    }

    .connector-dashed {
      width: 1.5px;
      height: 0.5rem;
      border-left: 1.5px dashed #fbbf24;
      margin: 0 auto;
    }

    .reminders {
      margin-top: auto;
      padding-top: 1rem;
    }

    .reminder-item {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      font-size: 0.6875rem;
      color: #94a3b8;
      line-height: 1.5;
    }

    .reminder-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-top: 0.35rem;
      flex-shrink: 0;
    }

    .footer {
      text-align: center;
      margin-top: 0.75rem;
      font-size: 0.5rem;
      color: #475569;
    }

    /* 箭头装饰 */
    .arrow-down {
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid #475569;
      margin: 0 auto 0.25rem;
    }

    .arrow-down-gold {
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid #fbbf24;
      margin: 0 auto 0.25rem;
    }

    .arrow-down-emerald {
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid #34d399;
      margin: 0 auto 0.25rem;
    }

    .event-flow {
      position: absolute;
      left: 50%;
      top: 3.2rem;
      transform: translateX(-50%);
      background: rgba(251, 146, 60, 0.2);
      border: 1px solid #fb923c;
      border-radius: 50%;
      width: 3rem;
      height: 3rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 0.5rem;
      color: #fb923c;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div class="lockscreen">
    <div class="header">
      <h1>PaperLifeOS v0.3</h1>
      <p>事件驱动 · 可调试</p>
    </div>

    <div class="diagram">
      <!-- 实践层 -->
      <div class="layer practice">
        <div class="layer-title">实践层</div>
        <div class="layer-sub">产生真实事件 · 可观测结果</div>
      </div>

      <div class="arrow-down"></div>
      <div class="connector"></div>
      <div class="arrow-down"></div>

      <!-- 叙事 + 锚定 -->
      <div class="middle-row">
        <div class="layer narrative">
          <div class="layer-title">叙事层</div>
          <div class="layer-sub">方向 · 身份 · 目标</div>
        </div>
        <div class="layer anchor">
          <div class="layer-title">锚定层</div>
          <div class="layer-sub">身体 · 他人 · 时间</div>
        </div>
      </div>

      <div class="arrow-down-gold"></div>

      <!-- 张力带 -->
      <div class="tension-band">
        <span>张力带 — 直觉异常涌现</span>
      </div>

      <div class="arrow-down-emerald"></div>

      <!-- 调整器 -->
      <div class="adjuster">
        <div class="layer-title">调整器</div>
        <div class="layer-sub">只调一层 · 当下可启动 · 最小记录</div>
      </div>

      <div class="arrow-down"></div>

      <!-- 输出 -->
      <div class="outputs">
        <div class="output-item output-action">具体行动</div>
        <div class="output-item output-inaction">非行动</div>
        <div class="output-item output-debug">调试模式</div>
      </div>
    </div>

    <div class="reminders">
      <div class="reminder-item">
        <div class="reminder-dot" style="background: #22d3ee;"></div>
        <span>顺境锚定：好消息时生成可被证伪的负面预测</span>
      </div>
      <div class="reminder-item">
        <div class="reminder-dot" style="background: #fb7185;"></div>
        <span>逆境锚定：坏消息时寻找未被摧毁的锚定点</span>
      </div>
      <div class="reminder-item">
        <div class="reminder-dot" style="background: #fbbf24;"></div>
        <span>身体信号：紧 · 松 · 麻木 · 过载 · 沉 · 钝 · 波动</span>
      </div>
      <div class="reminder-item">
        <div class="reminder-dot" style="background: #a78bfa;"></div>
        <span>禁止：待办清单 · 打卡表 · 量化指标 · 同时调多层</span>
      </div>
    </div>

    <div class="footer">
      运行 · 观察 · 调整
    </div>
  </div>
</body>
</html>
